name: 🧪 E2E Playwright Tests (AI Healer)

on:
  repository_dispatch:
    types: [erp-updated]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        # 파일 경로 대신 매트릭스 이름만 받도록 변경합니다.
        description: "실행할 테스트명 (auth, project, kanban 등. 전체는 all 입력)"
        required: false
        default: "auth"

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  API_URL:  ${{ secrets.API_URL }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASS:  ${{ secrets.ADMIN_PASS }}
  FAIL_EMAIL:  ${{ secrets.FAIL_EMAIL }}
  FAIL_PASS:   ${{ secrets.FAIL_PASS }}

jobs:
  # 🌟 1. [신규 추가] 어떤 테스트를 돌릴지 결정하는 두뇌(Setup) 역할
  setup:
    name: 🧠 Determine Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.suites }}
    steps:
      - name: Set dynamic matrix
        id: set-matrix
        run: |
          ALL_SUITES='["auth", "project", "issue", "sprint", "team", "profile", "kanban"]'
          
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "🚀 Push 이벤트 감지: auth 테스트만 실행합니다."
            echo "suites=[\"auth\"]" >> $GITHUB_OUTPUT
            
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.test_suite }}"
            if [ "$INPUT" == "all" ] || [ "$INPUT" == "" ]; then
              echo "🚀 수동 전체 실행 감지: 모든 테스트를 실행합니다."
              echo "suites=$ALL_SUITES" >> $GITHUB_OUTPUT
            else
              echo "🚀 수동 단일 실행 감지: $INPUT 테스트만 실행합니다."
              echo "suites=[\"$INPUT\"]" >> $GITHUB_OUTPUT
            fi
            
          else
            echo "🚀 배포 완료(Repository Dispatch) 감지: 모든 테스트를 실행합니다."
            echo "suites=$ALL_SUITES" >> $GITHUB_OUTPUT
          fi

  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('requirements.txt', 'Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: erp-e2e-test:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          outputs: type=docker,dest=/tmp/erp-e2e-test.tar

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/erp-e2e-test.tar
          retention-days: 1

  test:
    name: 🎭 Run ${{ matrix.suite }} Tests
    runs-on: ubuntu-latest
    needs: [setup, build] # 👈 setup 작업이 끝날 때까지 기다립니다.
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.setup.outputs.matrix) }} # 👈 하드코딩 대신 setup에서 넘겨준 배열을 받습니다!
    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/erp-e2e-test.tar

      - name: Run ${{ matrix.suite }} tests
        run: |
          docker run --rm \
            -e BASE_URL="${{ secrets.BASE_URL }}" \
            -e API_URL="${{ secrets.API_URL }}" \
            -e ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            -e ADMIN_PASS="${{ secrets.ADMIN_PASS }}" \
            -e FAIL_EMAIL="${{ secrets.FAIL_EMAIL }}" \
            -e FAIL_PASS="${{ secrets.FAIL_PASS }}" \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/testim:/app/testim \
            erp-e2e-test:${{ github.sha }} \
            python -m pytest tests/playwright/test_${{ matrix.suite }}.py \
              -s -v \
              --tb=short \
              --junitxml=test-results/${{ matrix.suite }}-results.xml \
              --browser chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            test-results/${{ matrix.suite }}-results.xml
            testim/healing/
          retention-days: 7

  report:
    name: 📊 Aggregate Results
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: all-results

      - name: Generate summary report
        run: |
          echo "## 🧪 E2E 테스트 결과 요약" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "**트리거**: ERP-SUT 업데이트 (by ${{ github.event.client_payload.actor }})" >> $GITHUB_STEP_SUMMARY
            echo "**ERP 커밋**: \`${{ github.event.client_payload.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 테스트 Suite | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          for suite in auth project issue sprint team profile kanban; do
            XML_FILE="all-results/${suite}-results.xml"
            if [ -f "$XML_FILE" ]; then
              FAILURES=$(grep -oP 'failures="\K[^"]+' "$XML_FILE" | head -1)
              ERRORS=$(grep -oP 'errors="\K[^"]+' "$XML_FILE" | head -1)
              TESTS=$(grep -oP 'tests="\K[^"]+' "$XML_FILE" | head -1)
              if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
                echo "| $suite | ✅ PASS ($TESTS tests) |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $suite | ❌ FAIL (failures=$FAILURES, errors=$ERRORS) |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $suite | ⏭️ SKIPPED |" >> $GITHUB_STEP_SUMMARY
            fi
          done